<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1220" viewBox="0 0 1200 1220">
  <defs>
    <style>
      .title { font: 700 28px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #1f2937; }
      .section { font: 700 22px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #0f172a; }
      .label { font: 600 16px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #0f172a; }
      .sublabel { font: 400 14px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #334155; }
      .panel { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; rx: 18; ry: 18; }
      .nodeA { fill: #dbeafe; stroke: #60a5fa; stroke-width: 2; rx: 14; ry: 14; }
      .nodeB { fill: #dcfce7; stroke: #4ade80; stroke-width: 2; rx: 14; ry: 14; }
      .nodeC { fill: #fef3c7; stroke: #f59e0b; stroke-width: 2; rx: 14; ry: 14; }
      .arrow { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <polygon points="0,0 10,5 0,10" fill="#64748b" />
    </marker>
  </defs>

  <text x="600" y="42" text-anchor="middle" class="title">MNIST CNN Network Architectures</text>

  <rect x="40" y="80" width="1120" height="320" class="panel"/>
  <text x="70" y="120" class="section">LectureCNN（单层卷积）</text>
  <rect x="80" y="170" width="130" height="72" class="nodeA"/>
  <text x="145" y="200" text-anchor="middle" class="label">Input</text>
  <text x="145" y="224" text-anchor="middle" class="sublabel">1×28×28</text>
  <rect x="250" y="170" width="150" height="72" class="nodeA"/>
  <text x="325" y="200" text-anchor="middle" class="label">Conv</text>
  <text x="325" y="224" text-anchor="middle" class="sublabel">20 @ 9×9</text>
  <rect x="440" y="170" width="110" height="72" class="nodeA"/>
  <text x="495" y="200" text-anchor="middle" class="label">ReLU</text>
  <text x="495" y="224" text-anchor="middle" class="sublabel">20×20×20</text>
  <rect x="590" y="170" width="140" height="72" class="nodeA"/>
  <text x="660" y="200" text-anchor="middle" class="label">AvgPool</text>
  <text x="660" y="224" text-anchor="middle" class="sublabel">2×2 → 20×10×10</text>
  <rect x="770" y="170" width="140" height="72" class="nodeA"/>
  <text x="840" y="200" text-anchor="middle" class="label">Flatten</text>
  <text x="840" y="224" text-anchor="middle" class="sublabel">2000</text>
  <rect x="950" y="170" width="150" height="72" class="nodeA"/>
  <text x="1025" y="200" text-anchor="middle" class="label">FC + ReLU</text>
  <text x="1025" y="224" text-anchor="middle" class="sublabel">2000 → 100</text>
  <rect x="525" y="290" width="150" height="72" class="nodeA"/>
  <text x="600" y="320" text-anchor="middle" class="label">FC + Softmax</text>
  <text x="600" y="344" text-anchor="middle" class="sublabel">100 → 10</text>
  <line x1="210" y1="206" x2="250" y2="206" class="arrow"/>
  <line x1="400" y1="206" x2="440" y2="206" class="arrow"/>
  <line x1="550" y1="206" x2="590" y2="206" class="arrow"/>
  <line x1="730" y1="206" x2="770" y2="206" class="arrow"/>
  <line x1="910" y1="206" x2="950" y2="206" class="arrow"/>
  <line x1="1025" y1="242" x2="1025" y2="326" class="arrow"/>
  <line x1="1025" y1="326" x2="675" y2="326" class="arrow"/>

  <rect x="40" y="440" width="1120" height="320" class="panel"/>
  <text x="70" y="480" class="section">DoubleCNN（双层卷积）</text>
  <rect x="80" y="530" width="120" height="72" class="nodeB"/>
  <text x="140" y="560" text-anchor="middle" class="label">Input</text>
  <text x="140" y="584" text-anchor="middle" class="sublabel">1×28×28</text>
  <rect x="230" y="530" width="130" height="72" class="nodeB"/>
  <text x="295" y="560" text-anchor="middle" class="label">Conv1</text>
  <text x="295" y="584" text-anchor="middle" class="sublabel">12 @ 5×5</text>
  <rect x="390" y="530" width="110" height="72" class="nodeB"/>
  <text x="445" y="560" text-anchor="middle" class="label">ReLU</text>
  <text x="445" y="584" text-anchor="middle" class="sublabel">12×24×24</text>
  <rect x="530" y="530" width="140" height="72" class="nodeB"/>
  <text x="600" y="560" text-anchor="middle" class="label">AvgPool</text>
  <text x="600" y="584" text-anchor="middle" class="sublabel">2×2 → 12×12×12</text>
  <rect x="700" y="530" width="130" height="72" class="nodeB"/>
  <text x="765" y="560" text-anchor="middle" class="label">Conv2</text>
  <text x="765" y="584" text-anchor="middle" class="sublabel">24 @ 5×5</text>
  <rect x="860" y="530" width="110" height="72" class="nodeB"/>
  <text x="915" y="560" text-anchor="middle" class="label">ReLU</text>
  <text x="915" y="584" text-anchor="middle" class="sublabel">24×8×8</text>
  <rect x="1000" y="530" width="140" height="72" class="nodeB"/>
  <text x="1070" y="560" text-anchor="middle" class="label">AvgPool</text>
  <text x="1070" y="584" text-anchor="middle" class="sublabel">2×2 → 24×4×4</text>
  <rect x="330" y="650" width="140" height="72" class="nodeB"/>
  <text x="400" y="680" text-anchor="middle" class="label">Flatten</text>
  <text x="400" y="704" text-anchor="middle" class="sublabel">384</text>
  <rect x="520" y="650" width="160" height="72" class="nodeB"/>
  <text x="600" y="680" text-anchor="middle" class="label">FC + ReLU</text>
  <text x="600" y="704" text-anchor="middle" class="sublabel">384 → 128</text>
  <rect x="730" y="650" width="160" height="72" class="nodeB"/>
  <text x="810" y="680" text-anchor="middle" class="label">FC + Softmax</text>
  <text x="810" y="704" text-anchor="middle" class="sublabel">128 → 10</text>
  <line x1="200" y1="566" x2="230" y2="566" class="arrow"/>
  <line x1="360" y1="566" x2="390" y2="566" class="arrow"/>
  <line x1="500" y1="566" x2="530" y2="566" class="arrow"/>
  <line x1="670" y1="566" x2="700" y2="566" class="arrow"/>
  <line x1="830" y1="566" x2="860" y2="566" class="arrow"/>
  <line x1="970" y1="566" x2="1000" y2="566" class="arrow"/>
  <line x1="1070" y1="602" x2="1070" y2="686" class="arrow"/>
  <line x1="1070" y1="686" x2="470" y2="686" class="arrow"/>
  <line x1="470" y1="686" x2="520" y2="686" class="arrow"/>
  <line x1="680" y1="686" x2="730" y2="686" class="arrow"/>

  <rect x="40" y="800" width="1120" height="360" class="panel"/>
  <text x="70" y="840" class="section">TripleCNN（三层卷积）</text>
  <rect x="80" y="890" width="120" height="72" class="nodeC"/>
  <text x="140" y="920" text-anchor="middle" class="label">Input</text>
  <text x="140" y="944" text-anchor="middle" class="sublabel">1×28×28</text>
  <rect x="225" y="890" width="120" height="72" class="nodeC"/>
  <text x="285" y="920" text-anchor="middle" class="label">Conv1</text>
  <text x="285" y="944" text-anchor="middle" class="sublabel">12 @ 3×3</text>
  <rect x="370" y="890" width="110" height="72" class="nodeC"/>
  <text x="425" y="920" text-anchor="middle" class="label">ReLU</text>
  <text x="425" y="944" text-anchor="middle" class="sublabel">12×26×26</text>
  <rect x="505" y="890" width="140" height="72" class="nodeC"/>
  <text x="575" y="920" text-anchor="middle" class="label">AvgPool</text>
  <text x="575" y="944" text-anchor="middle" class="sublabel">2×2 → 12×13×13</text>
  <rect x="670" y="890" width="120" height="72" class="nodeC"/>
  <text x="730" y="920" text-anchor="middle" class="label">Conv2</text>
  <text x="730" y="944" text-anchor="middle" class="sublabel">24 @ 3×3</text>
  <rect x="815" y="890" width="110" height="72" class="nodeC"/>
  <text x="870" y="920" text-anchor="middle" class="label">ReLU</text>
  <text x="870" y="944" text-anchor="middle" class="sublabel">24×11×11</text>
  <rect x="950" y="890" width="140" height="72" class="nodeC"/>
  <text x="1020" y="920" text-anchor="middle" class="label">AvgPool</text>
  <text x="1020" y="944" text-anchor="middle" class="sublabel">2×2 → 24×5×5</text>
  <rect x="210" y="1020" width="120" height="72" class="nodeC"/>
  <text x="270" y="1050" text-anchor="middle" class="label">Conv3</text>
  <text x="270" y="1074" text-anchor="middle" class="sublabel">32 @ 3×3</text>
  <rect x="360" y="1020" width="110" height="72" class="nodeC"/>
  <text x="415" y="1050" text-anchor="middle" class="label">ReLU</text>
  <text x="415" y="1074" text-anchor="middle" class="sublabel">32×3×3</text>
  <rect x="500" y="1020" width="120" height="72" class="nodeC"/>
  <text x="560" y="1050" text-anchor="middle" class="label">Flatten</text>
  <text x="560" y="1074" text-anchor="middle" class="sublabel">288</text>
  <rect x="650" y="1020" width="160" height="72" class="nodeC"/>
  <text x="730" y="1050" text-anchor="middle" class="label">FC + ReLU</text>
  <text x="730" y="1074" text-anchor="middle" class="sublabel">288 → 96</text>
  <rect x="840" y="1020" width="160" height="72" class="nodeC"/>
  <text x="920" y="1050" text-anchor="middle" class="label">FC + Softmax</text>
  <text x="920" y="1074" text-anchor="middle" class="sublabel">96 → 10</text>
  <line x1="200" y1="926" x2="225" y2="926" class="arrow"/>
  <line x1="345" y1="926" x2="370" y2="926" class="arrow"/>
  <line x1="480" y1="926" x2="505" y2="926" class="arrow"/>
  <line x1="645" y1="926" x2="670" y2="926" class="arrow"/>
  <line x1="790" y1="926" x2="815" y2="926" class="arrow"/>
  <line x1="925" y1="926" x2="950" y2="926" class="arrow"/>
  <line x1="1020" y1="962" x2="1020" y2="1056" class="arrow"/>
  <line x1="1020" y1="1056" x2="330" y2="1056" class="arrow"/>
  <line x1="330" y1="1056" x2="360" y2="1056" class="arrow"/>
  <line x1="470" y1="1056" x2="500" y2="1056" class="arrow"/>
  <line x1="620" y1="1056" x2="650" y2="1056" class="arrow"/>
  <line x1="810" y1="1056" x2="840" y2="1056" class="arrow"/>
</svg>
